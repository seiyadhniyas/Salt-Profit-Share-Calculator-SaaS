[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Cache headers for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[context.production.environment]
# Set server-side values in the Netlify UI instead of committing secrets.
# Browser auth/dashboard variables should live in .env.local as VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY or VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY.
  SUPABASE_URL = "https://your-project.supabase.co"
  SUPABASE_KEY = "<YOUR_SUPABASE_SERVICE_ROLE_OR_API_KEY>"

[dev]
  # Netlify Dev should wait for the local framework server on this port
  targetPort = 3000

[functions]
  # Use Node File Trace bundler to avoid esbuild inlining duplicate top-level symbols
  node_bundler = "nft"
